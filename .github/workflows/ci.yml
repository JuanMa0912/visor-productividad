name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Explicit heap for ubuntu-latest; local/Linux deploys use scripts/build.mjs heuristics.
      NEXT_BUILD_MEMORY_MB: "4096"
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: produXdia
      DB_USER: postgres
      DB_PASSWORD: ci-placeholder
      DB_SCHEMA: public
      AUDIT_IP_HMAC_SECRET: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run ci
